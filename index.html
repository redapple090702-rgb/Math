<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시차 적응 수리 모델링 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { font-size: 24px; text-align: center; margin-bottom: 20px; color: #1e293b; }
        .control-panel { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        label { font-weight: bold; font-size: 14px; }
        input[type="number"] { width: 80px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; text-align: center; }
        button { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; }
        .info-item { margin-bottom: 12px; font-size: 14px; }
        .info-item span { font-weight: bold; color: #2563eb; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 9999px; font-size: 12px; font-weight: bold; text-align: center; }
        .adapting { background: #fee2e2; color: #ef4444; }
        .complete { background: #dcfce7; color: #10b981; }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ 시차 적응 수리 모델링 대시보드 (학번: 20417 안정현)</h1>
    
    <div class="control-panel">
        <label for="dayInput">적응 날짜 입력 (1 ~ 12일): </label>
        <input type="number" id="dayInput" min="1" max="15" value="1">
        <button onclick="updateSimulation()">시뮬레이션 적용</button>
    </div>

    <div class="dashboard">
        <div style="position: relative; height:40vh; width:100%">
            <canvas id="rhythmChart"></canvas>
        </div>
        
        <div class="info-box">
            <h3>📊 실시간 연산 정보</h3>
            <div class="info-item">현재 입력된 날짜: <span id="outDay">1</span>일 차</div>
            <div class="info-item">신체 리듬 평행이동($a_n$): <span id="outPhase">21</span>시</div>
            <div class="info-item">신체 컨디션 최고점: <span id="outPeak">오전 3시</span></div>
            <div class="info-item">시차 고통 지수(JPI): <span id="outJPI">6.2554</span></div>
            <div class="info-item">현재 적응 상태: <span id="outStatus" class="status-badge adapting">시차 적응 중</span></div>
        </div>
    </div>
</div>

<script>
    let chart;
    
    // 시간 축 데이터 생성 (0시 ~ 24시)
    const tValues = [];
    for (let t = 0; t <= 24; t += 0.5) { tValues.push(t); }

    // 뉴욕 표준 리듬 f(t) 데이터 생성
    const yLocal = tValues.map(t => 5 * Math.sin((Math.PI / 12) * (t - 10)) + 5);

    // 초기 차트 그리기 함수
    function initChart() {
        const ctx = document.getElementById('rhythmChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: tValues,
                datasets: [
                    {
                        label: '뉴욕 표준 리듬 f(t)',
                        data: yLocal,
                        borderColor: '#0f172a',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    },
                    {
                        label: '내 신체 리듬 g(t)',
                        data: [],
                        borderColor: '#ef4444',
                        borderWidth: 3,
                        fill: false,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: '뉴욕 현지 시간 (Hour)' } },
                    y: { title: { display: true, text: '각성도 레벨 (0 - 10)' }, min: -1, max: 11 }
                }
            }
        });
        updateSimulation(); // 처음 실행 시 1일차 데이터 반영
    }

    // 입력값에 따라 그래프와 정보를 업데이트하는 핵심 함수
    function updateSimulation() {
        const day = parseInt(document.getElementById('dayInput').value) || 1;
        
        // 등차수열 점화식 모델링 연산
        let phase = 22 - day;
        if (phase < 10) phase = 10; // 목표치 수렴 바운딩

        // 일차별 신체 리듬 g(t) 계산
        const yBody = tValues.map(t => 5 * Math.sin((Math.PI / 12) * (t - phase)) + 5);

        // 시차 고통 지수(JPI) 연산 (차함수의 절댓값 평균)
        let totalDiff = 0;
        for (let i = 0; i < tValues.length; i++) {
            totalDiff += Math.abs(yLocal[i] - yBody[i]);
        }
        const jpi = totalDiff / tValues.length;

        // 신체 최고점 시간 계산
        let peakTime = phase + 6;
        if (peakTime >= 24) peakTime -= 24;
        let peakStr = peakTime >= 12 ? `오후 ${peakTime-12}시` : `오전 ${peakTime}시`;
        if (peakTime === 0) peakStr = "자정 0시";

        // 차트 데이터 교체 및 업데이트 애니메이션 재생
        chart.data.datasets[1].data = yBody;
        chart.data.datasets[1].borderColor = (phase === 10) ? '#10b981' : '#ef4444';
        chart.update();

        // 우측 정보창 텍스트 실시간 업데이트
        document.getElementById('outDay').innerText = day;
        document.getElementById('outPhase').innerText = phase;
        document.getElementById('outPeak').innerText = peakStr;
        document.getElementById('outJPI').innerText = jpi.toFixed(4);
        
        const statusEl = document.getElementById('outStatus');
        if (phase === 10) {
            statusEl.innerText = "적응 완료!";
            statusEl.className = "status-badge complete";
        } else {
            statusEl.innerText = "시차 적응 중";
            statusEl.className = "status-badge adapting";
        }
    }

    // 페이지 로드 시 차트 초기화 실행
    window.onload = initChart;
</script>

</body>
</html>
